version: "3"

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=tp-hadoop
    env_file:
      - ./hadoop.env
    volumes:
      - ./data:/tp/data   # ✅ IMPORTANT

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    ports:
      - "9864:9864"
    depends_on:
      - namenode
    env_file:
      - ./hadoop.env
    volumes:
      - ./data:/tp/data   # ✅ IMPORTANT

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    ports:
      - "9865:9864"
    depends_on:
      - namenode
    env_file:
      - ./hadoop.env
    volumes:
      - ./data:/tp/data   # ✅ IMPORTANT